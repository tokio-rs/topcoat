[workspace]
resolver = "2"
members = [
    "crates/topcoat",
    "crates/topcoat-asset",
    "crates/topcoat-cli",
    "crates/topcoat-core",
    "crates/topcoat-macro",
    "crates/topcoat-pretty",
    "crates/topcoat-router",
    "crates/topcoat-runtime",
    "crates/topcoat-tailwind",
    "crates/topcoat-view",

    "examples/hello-world",
]

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.dependencies]
# Topcoat crates
topcoat = { path = "crates/topcoat" }
topcoat-asset = { path = "crates/topcoat-asset" }
topcoat-core = { path = "crates/topcoat-core" }
topcoat-macro = { path = "crates/topcoat-macro" }
topcoat-pretty = { path = "crates/topcoat-pretty" }
topcoat-router = { path = "crates/topcoat-router" }
topcoat-runtime = { path = "crates/topcoat-runtime" }
topcoat-tailwind = { path = "crates/topcoat-tailwind" }
topcoat-view = { path = "crates/topcoat-view" }

anyhow = "1.0"
anymap3 = "1.0"
axum = "0.8.8"
boxcar = "0.2"
bumpalo = "3.20"
clap = "4.6.0"
console = "0.16"
const-serialize = "0.7"
futures-util = "0.3"
glob = "0.3.3"
hashbrown = "0.17"
heck = "0.5.0"
http = "1.4.0"
indicatif = "0.18"
inventory = "0.3.24"
memchr = "2.8"
notify = "8.1.0"
pin-project-lite = "0.2"
prettyplease = "0.2"
proc-macro2 = "1.0.106"
quote = "1.0.45"
ref-cast = "1.0"
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
serde = "1"
serde_json = "1"
serde_urlencoded = "0.7"
sha2 = "0.11"
syn = "2.0.117"
thiserror = "2.0.18"
tokio = "1.51.1"
toml = "1.1.2"
tokio-tungstenite = "0.29"
tower = "0.5"
tower-http = "0.6"
tower-service = "0.3"
ureq = "3.3"
uuid = "1.23"
