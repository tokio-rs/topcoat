criterion = "0.8"
dialoguer = { version = "0.12", default-features = false }
form_urlencoded = "1"
futures-core = "0.3"
futures-util = "0.3"
glob = "0.3.3"
hashbrown = "0.17"
heck = "0.5.0"
http = "1.4.0"
http-body = "1"
http-body-util = "0.1"
hyper = "1"
hyper-util = "0.1"
indicatif = "0.18"
inventory = "0.3.24"
itoa = "1.0"
matchit = "0.9"
memchr = "2.8"
mime_guess = "2"
multer = "3.1"
notify = "8.1.0"
percent-encoding = "2"
pin-project-lite = "0.2"
prettyplease = "0.2"
