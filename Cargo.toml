[workspace]
resolver = "2"
members = [
    "crates/topcoat",
    "crates/topcoat-cli",
    "crates/topcoat-core",
    "crates/topcoat-macro",
    "crates/topcoat-pretty",
    "crates/topcoat-router",
    "crates/topcoat-view",

    "examples/hello-world",
]

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.dependencies]
# Topcoat crates
topcoat = { path = "crates/topcoat" }
topcoat-core = { path = "crates/topcoat-core" }
topcoat-macro = { path = "crates/topcoat-macro" }
topcoat-pretty = { path = "crates/topcoat-pretty" }
topcoat-router = { path = "crates/topcoat-router" }
topcoat-view = { path = "crates/topcoat-view" }

axum = "0.8.8"
boxcar = "0.2"
bumpalo = "3.20"
clap = "4.6.0"
console = "0.16"
futures-util = "0.3"
glob = "0.3.3"
hashbrown = "0.17"
heck = "0.5.0"
http = "1.4.0"
indicatif = "0.18"
inventory = "0.3.24"
notify = "8.1.0"
pin-project = "1.1"
prettyplease = "0.2"
proc-macro2 = "1.0.106"
quote = "1.0.45"
ref-cast = "1.0"
serde = "1"
serde_json = "1"
serde_urlencoded = "0.7"
syn = "2.0.117"
thiserror = "2.0.18"
tokio = "1.51.1"
tokio-tungstenite = "0.29"
tower = "0.5"
