[workspace]
resolver = "2"
members = [
    "crates/topcoat",
    "crates/topcoat-asset",
    "crates/topcoat-cli",
    "crates/topcoat-cookie",
    "crates/topcoat-core",
    "crates/topcoat-core/grammar",
    "crates/topcoat-core/macro",
    "crates/topcoat-font",
    "crates/topcoat-font/grammar",
    "crates/topcoat-font/macro",
    "crates/topcoat-htmx",
    "crates/topcoat-icon",
    "crates/topcoat-icon/grammar",
    "crates/topcoat-icon/macro",
    "crates/topcoat-router",
    "crates/topcoat-router/grammar",
    "crates/topcoat-router/macro",
    "crates/topcoat-runtime",
    "crates/topcoat-runtime/grammar",
    "crates/topcoat-runtime/macro",
    "crates/topcoat-tailwind",
    "crates/topcoat-ui",
    "crates/topcoat-ui/registry",
    "crates/topcoat-view",
    "crates/topcoat-view/grammar",
    "crates/topcoat-view/macro",

    "examples/app-context",
    "examples/asset",
    "examples/context",
    "examples/cookie",
    "examples/font",
    "examples/hello-world",
    "examples/htmx",
    "examples/icon",
    "examples/manual-router",
    "examples/module-router",
    "examples/path-query-params",
    "examples/procedure",
    "examples/request-response",
    "examples/runtime",
    "examples/shard",
    "examples/tailwind",
    "examples/toasty-todo",
    "examples/ui",

    "benchmarks/topcoat",
]
exclude = [
    "benchmarks/leptos",
]

[workspace.package]
version = "0.0.3"
edition = "2024"
authors = ["Julien Scholz <hello@julien-scholz.dev>"]
license = "MIT"
description = "A modular, batteries-included Rust web framework for server-rendered apps."
repository = "https://github.com/tokio-rs/topcoat"
homepage = "https://github.com/tokio-rs/topcoat"
keywords = ["web", "framework", "ssr", "html", "server"]
categories = ["web-programming", "web-programming::http-server"]
rust-version = "1.95"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.rustdoc]
broken_intra_doc_links = "deny" 

[workspace.lints.clippy]
mod_module_files = "deny"
pedantic = { level = "warn", priority = -1 }
too_many_lines = "allow"

[profile.dev]
debug = true

[profile.dev.package."*"]
debug = false

[profile.test]
debug = 1

[profile.test.package."*"]
debug = false

[workspace.dependencies]
# The `topcoat` facade is only ever a dev-dependency of the publishable
# sub-crates (and a normal dependency of the non-publishable examples), so it
# deliberately carries NO version. A versioned dev-dependency would force cargo
# to resolve `topcoat = "^X.Y.Z"` against crates.io when *packaging* a sub-crate
# for publish. That is impossible during a release, since the sub-crates publish
# before the facade does. Path-only dev-dependencies are dropped from the published
# manifest, sidestepping the facade<->sub-crate cycle. Do not add a version here.
topcoat = { path = "crates/topcoat" }
topcoat-asset = { version = "0.0.3", path = "crates/topcoat-asset" }
topcoat-cookie = { version = "0.0.3", path = "crates/topcoat-cookie" }
topcoat-core = { version = "0.0.3", path = "crates/topcoat-core" }
topcoat-core-grammar = { version = "0.0.3", path = "crates/topcoat-core/grammar" }
topcoat-core-macro = { version = "0.0.3", path = "crates/topcoat-core/macro" }
topcoat-font = { version = "0.0.3", path = "crates/topcoat-font" }
topcoat-font-grammar = { version = "0.0.3", path = "crates/topcoat-font/grammar" }
topcoat-font-macro = { version = "0.0.3", path = "crates/topcoat-font/macro" }
topcoat-htmx = { version = "0.0.3", path = "crates/topcoat-htmx" }
topcoat-icon = { version = "0.0.3", path = "crates/topcoat-icon" }
topcoat-icon-grammar = { version = "0.0.3", path = "crates/topcoat-icon/grammar" }
topcoat-icon-macro = { version = "0.0.3", path = "crates/topcoat-icon/macro" }
topcoat-router = { version = "0.0.3", path = "crates/topcoat-router" }
topcoat-router-grammar = { version = "0.0.3", path = "crates/topcoat-router/grammar" }
topcoat-router-macro = { version = "0.0.3", path = "crates/topcoat-router/macro" }
topcoat-runtime = { version = "0.0.3", path = "crates/topcoat-runtime" }
topcoat-runtime-grammar = { version = "0.0.3", path = "crates/topcoat-runtime/grammar" }
topcoat-runtime-macro = { version = "0.0.3", path = "crates/topcoat-runtime/macro" }
topcoat-tailwind = { version = "0.0.3", path = "crates/topcoat-tailwind" }
topcoat-ui = { version = "0.0.3", path = "crates/topcoat-ui" }
topcoat-ui-registry = { version = "0.0.3", path = "crates/topcoat-ui/registry" }
topcoat-view = { version = "0.0.3", path = "crates/topcoat-view" }
topcoat-view-grammar = { version = "0.0.3", path = "crates/topcoat-view/grammar" }
topcoat-view-macro = { version = "0.0.3", path = "crates/topcoat-view/macro" }

anyhow = "1.0"
anymap3 = "1.0"
axum = "0.8.8"
boxcar = "0.2"
bytes = "1"
clap = "4.6.0"
console = "0.16"
