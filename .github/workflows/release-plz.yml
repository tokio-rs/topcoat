name: Release-plz

on:
  # Gate releases on CI: fire only after the CI workflow finishes on `main`
  # (the `branches` filter excludes PR runs, whose head branch isn't `main`),
  # and let each job below bail unless that run actually succeeded.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # Publishes crates to crates.io + creates git tags and GitHub Releases
  # once a release PR is merged. On ordinary pushes this is a no-op because
  # the workspace versions already match crates.io.
  release-plz-release:
    name: release
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'tokio-rs'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # First publish attempt. Allowed to fail: crates.io throttles publishing
      # to a burst of 30 new versions and then refills one publish per minute,
      # and neither cargo nor release-plz retries the resulting HTTP 429. Once
      # the workspace grows past ~30 crates this step can't publish them all in
      # one go, so the loop below resumes it. The action also installs the
      # `release-plz` binary onto PATH, which that loop reuses.
      - name: Run release-plz
        uses: release-plz/action@v0.5
        continue-on-error: true
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Resume publishing across the crates.io rate limit. release-plz is
      # idempotent (it skips versions already on crates.io and tags/releases
      # that already exist — the same property that makes it a no-op on
      # ordinary pushes), so we just re-run it, sleeping a little over a minute
      # between attempts to let the token bucket refill. On the happy path
      # (<=30 crates) the step above already published everything and the first
      # iteration here is a cheap no-op. Non-rate-limit failures are surfaced
      # immediately rather than retried.
      - name: Resume release-plz through crates.io rate limits
        shell: bash
        env:
          # The bare `release-plz` binary reads the git-forge token from
          # GIT_TOKEN. (The action wrapper above translates its GITHUB_TOKEN
          # input into --git-token for us; invoking the CLI directly here, we
          # must supply GIT_TOKEN ourselves.) Without it, creating the GitHub
          # release fails with "git release not configured".
          GIT_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail

          max_attempts=50
          cooldown_seconds=70   # bucket refills ~1/min; the margin avoids racing it
          log="$(mktemp)"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::release-plz release (attempt ${attempt}/${max_attempts})"
            release-plz release 2>&1 | tee "$log"
            status="${PIPESTATUS[0]}"
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "release-plz completed; nothing left to publish."
              exit 0
            fi

            if ! grep -qiE 'status 429|too many (requests|crates)' "$log"; then
              echo "release-plz failed for a non-rate-limit reason; not retrying." >&2
              exit "$status"
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Hit the crates.io publish rate limit. Sleeping ${cooldown_seconds}s for the token bucket to refill, then resuming."
              sleep "$cooldown_seconds"
            fi
          done

          echo "Still rate-limited after ${max_attempts} attempts; giving up." >&2
          exit 1

  # Maintains a draft "Release PR" containing the pending version bumps and
  # changelog updates. Force-pushed on every merge to main.
  release-plz-pr:
    name: pr
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'tokio-rs'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      # The docs pin an install version (`topcoat = { version = "X.Y.Z" }`)
      # in a few feature guides. Source of truth is the `topcoat` version in
      # `[workspace.dependencies]`, which release-plz bumps on the PR branch.
      # Re-applied on every run because release-plz force-pushes its branch.
      - name: Sync docs version with release PR
        if: ${{ steps.release-plz.outputs.prs != '' && steps.release-plz.outputs.prs != '[]' }}
        env:
          PRS: ${{ steps.release-plz.outputs.prs }}
        run: |
          set -euo pipefail
          branch=$(jq -r '.[0].head_branch' <<<"$PRS")
          if [ -z "$branch" ] || [ "$branch" = "null" ]; then
            echo "No release branch detected; skipping docs update."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin "$branch"
          git checkout "$branch"

          version=$(grep -m1 '^topcoat = { version' Cargo.toml \
            | sed -E 's/.*version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "Failed to parse topcoat version from Cargo.toml" >&2
            exit 1
          fi

          # Only touch `topcoat = { version = "..." }` snippets, leaving
          # unrelated tool/CDN versions (Tailwind, htmx, iconify, ...) alone.
          find crates/topcoat/docs -name '*.md' -exec sed -i -E \
            "s/(topcoat = \\{ version = \")[^\"]+(\")/\\1${version}\\2/g" {} +

          if git diff --quiet; then
            echo "Docs already on version ${version}; nothing to update."
            exit 0
          fi

          git add crates/topcoat/docs
          git commit -m "chore: point docs install version at ${version}"
          git push origin "$branch"
