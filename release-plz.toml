[workspace]
git_release_draft = true
pr_draft = true
pr_labels = ["release"]
release_always = false

# Every crate shares one lockstep version and is released together, so a
# bump to any crate bumps them all to the same version. Keep this list in
# sync with the publishable members under `crates/` (examples and
# benchmarks are `publish = false` and excluded automatically).
[[package]]
name = "topcoat"
version_group = "topcoat"

[[package]]
name = "topcoat-asset"
version_group = "topcoat"

[[package]]
name = "topcoat-cli"
version_group = "topcoat"

