[workspace]
git_release_draft = true
pr_draft = true
pr_labels = ["release"]
release_always = false
# Default to NOT releasing. Each publishable crate opts in with `release = true`
# below. This is deliberate: release-plz's release-order pass runs over *all*
# workspace members (including the `publish = false` examples/benchmarks) and its
# topological sort trips over the facade<->sub-crate dependencies, reporting a
# spurious "circular dependency" error. Defaulting to `release = false` keeps the
# non-publishable crates out of that pass. Keep the opt-in list below in sync with
# the publishable members under `crates/`.
release = false

[[package]]
name = "topcoat"
release = true
version_group = "topcoat"

