[package]
name = "topcoat-runtime-macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[features]
discover = [
	"topcoat-runtime-grammar/discover"
]

[dependencies]
topcoat-runtime-grammar.workspace = true

quote.workspace = true
syn = { workspace = true, features = ["full"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["runtime"] }

[lints]
workspace = true
