[package]
name = "topcoat-icon-iconify"
version = "0.1.0"
edition = "2024"

[features]
# Exposes the staging API (`BuildConfig`) for use from a build script.
build = [
	"dep:topcoat-core",
	"dep:serde_json",
	"dep:thiserror",
	"dep:ureq",
]

[dependencies]
topcoat-core = { workspace = true, optional = true, features = ["build"] }

serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
ureq = { workspace = true, optional = true }

[dev-dependencies]
topcoat = { workspace = true, features = ["icon-iconify"] }
serde_json.workspace = true

[lints]
workspace = true
