[package]
name = "topcoat-icon-iconify"
version = "0.1.0"
edition = "2024"

[features]
# Exposes the `ast` module.
parsing = [
	"dep:heck",
	"dep:proc-macro2",
	"dep:quote",
	"dep:syn",
	"dep:serde",
	"dep:serde_json",
]
# Exposes the staging API (`Sets`) for use from a build script.
build = [
	"dep:serde",
	"dep:serde_json",
	"dep:thiserror",
	"dep:ureq",
]

[dependencies]
heck = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, optional = true, features = ["full"] }

serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
ureq = { workspace = true, optional = true }

[dev-dependencies]
topcoat = { workspace = true, features = ["icon-iconify"] }

[lints]
workspace = true
