[package]
name = "topcoat-font-macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[features]
asset = [
	"topcoat-font/asset",
]

[dependencies]
topcoat-font = { workspace = true, features = ["parsing"] }

quote.workspace = true
syn = { workspace = true, features = ["full"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["font"] }

[lints]
workspace = true
