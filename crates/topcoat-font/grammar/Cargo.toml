[package]
name = "topcoat-font-grammar"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[features]
fontsource = [
	"topcoat-font/fontsource",
]
asset = [
	"topcoat-font/asset",
]
pretty = ["topcoat-core-grammar/pretty"]

[dependencies]
topcoat-core-grammar.workspace = true
topcoat-font.workspace = true

proc-macro2.workspace = true
quote.workspace = true
syn = { workspace = true, features = ["full"] }

[[test]]
name = "pretty"
required-features = ["pretty"]

[[test]]
name = "fontsource_pretty"
required-features = ["fontsource", "pretty"]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
