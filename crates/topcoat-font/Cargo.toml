[package]
name = "topcoat-font"
version = "0.1.0"
edition = "2024"

[features]
asset = [
	"dep:topcoat-asset",
]
discover = [
	"dep:inventory"
]
parsing = [
	"dep:syn",
	"dep:quote",
]
pretty = [
	"parsing",
	"dep:topcoat-pretty",
]
router = [
	"dep:topcoat-router",
]

[dependencies]
topcoat-core.workspace = true
topcoat-asset = { workspace = true, optional = true }
topcoat-router = { workspace = true, optional = true }
topcoat-pretty = { workspace = true, optional = true }

inventory = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, optional = true }

[lints]
workspace = true
