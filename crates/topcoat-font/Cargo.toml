[package]
name = "topcoat-font"
version = "0.1.0"
edition = "2024"

[features]
asset = [
	"dep:topcoat-asset",
]
discover = [
	"dep:inventory",
]
parsing = [
	"topcoat-core/parsing",
	"dep:syn",
	"dep:quote",
	"dep:proc-macro2",
]
pretty = [
	"parsing",
	"dep:topcoat-pretty",
]
router = [
	"dep:topcoat-router",
]
view = [
	"dep:topcoat-view",
	"topcoat-asset?/view",
]

[dependencies]
topcoat-core.workspace = true
topcoat-asset = { workspace = true, optional = true }
topcoat-router = { workspace = true, optional = true }
topcoat-pretty = { workspace = true, optional = true }
topcoat-view = { workspace = true, optional = true }

inventory = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, optional = true }

[dev-dependencies]
topcoat = { workspace = true, features = ["font"] }

[lints]
workspace = true
