[package]
name = "topcoat-font-fontsource"
version = "0.1.0"
edition = "2024"

[features]
asset = [
	"dep:topcoat-asset",
	"topcoat-font/asset",
]
# Exposes the `ast` module.
parsing = [
	"topcoat-core/parsing",
	"dep:proc-macro2",
	"dep:quote",
	"dep:syn",
]
pretty = [
	"parsing",
	"dep:topcoat-pretty",
]
# Enables the `refresh` binary, which fetches data from the Fontsource API.
refresh = [
	"dep:serde",
	"dep:serde_json",
	"dep:ureq",
]

[dependencies]
topcoat-core.workspace = true
topcoat-font.workspace = true
topcoat-asset = { workspace = true, optional = true }
topcoat-pretty = { workspace = true, optional = true }

proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, features = ["full"], optional = true }

serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
ureq = { workspace = true, optional = true }

[build-dependencies]
heck.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
topcoat-pretty.workspace = true

[[bin]]
name = "refresh"
required-features = ["refresh"]

[[test]]
name = "pretty"
required-features = ["pretty"]

[lints]
workspace = true
