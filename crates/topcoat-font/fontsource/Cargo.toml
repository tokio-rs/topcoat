[package]
name = "topcoat-font-fontsource"
version = "0.1.0"
edition = "2024"

[features]
asset = [
	"dep:topcoat-asset",
	"topcoat-font/asset",
]

[dependencies]
topcoat-core.workspace = true
topcoat-font.workspace = true
topcoat-asset = { workspace = true, optional = true }

[build-dependencies]
heck.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[lints]
workspace = true
