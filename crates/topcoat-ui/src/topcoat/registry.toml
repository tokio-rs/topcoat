# The built-in `topcoat` component registry. Hand-written: each component names
# its source file; hashes are computed from the source at runtime.

version = 1
name = "topcoat"

[components.button]
source = "components/button.rs"
dependencies = ["kek", { registry = "file://../reg2", name = "gadget" }]

[components.kek]
source = "components/kek.rs"
