# The built-in `topcoat` component registry, shipped by the `topcoat-ui` crate.
# Hand-written: each component names its source file; hashes are computed from
# the source at runtime. The registry's identity is its crate name (`topcoat-ui`),
# so the manifest records only the format version and the components.

version = 1

[components.button]
source = "components/button.rs"
dependencies = ["kek"]

[components.kek]
source = "components/kek.rs"
