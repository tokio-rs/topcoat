[package]
name = "topcoat-ui-registry"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

# Declares this crate as a topcoat-ui component registry: `topcoat ui` reads the
# `registry.toml` (and the theme and component sources it names) under this
# directory, relative to the crate root. A crate is usable as a registry only if
# it carries this key.
[package.metadata.topcoat-ui]
registry = "."

[dev-dependencies]
topcoat = { workspace = true, features = ["icon-iconify"] }

[build-dependencies]
topcoat-icon = { workspace = true, features = ["iconify-build"] }

[lints]
workspace = true
