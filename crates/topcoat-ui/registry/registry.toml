# Topcoat UI component registry.
#
# Each entry describes a component that can be installed with `topcoat ui add`.
# `version` is bumped whenever the component's source changes, so projects can
# be told which individual components have updates available. `source` is the
# path of the component file within this `registry/` directory.

[components.button]
version = "0.1.0"
source = "button.rs"

