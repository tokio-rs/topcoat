[package]
name = "topcoat-ui"
version = "0.1.0"
edition = "2024"

[features]
# Pulls in the registry generator (`topcoat_ui::generate`) and the registry
# binaries that emit `registry.toml`. Off by default so consumers like the CLI
# don't compile the generator or `sha2`.
generate = ["dep:sha2"]

[dependencies]
reqwest.workspace = true
serde = { workspace = true, features = ["derive"] }
sha2 = { workspace = true, optional = true }
thiserror.workspace = true
toml.workspace = true

[[bin]]
name = "topcoat-registry"
path = "src/topcoat/main.rs"
required-features = ["generate"]

[[bin]]
name = "reg2-registry"
path = "src/reg2/main.rs"
required-features = ["generate"]

[[bin]]
name = "reg3-registry"
path = "src/reg3/main.rs"
required-features = ["generate"]

[lints]
workspace = true
