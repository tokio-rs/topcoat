[package]
name = "topcoat-view-macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[dependencies]
topcoat-view = { workspace = true, features = ["parsing"] }

quote.workspace = true
syn = { workspace = true, features = ["full"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["view"] }

tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
