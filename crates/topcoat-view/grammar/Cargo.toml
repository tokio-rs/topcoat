[package]
name = "topcoat-view-grammar"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[features]
pretty = ["topcoat-core-grammar/pretty"]

[dependencies]
topcoat-core-grammar.workspace = true
topcoat-view.workspace = true

heck.workspace = true
proc-macro2 = { workspace = true, features = ["span-locations"] }
quote.workspace = true
syn = { workspace = true, features = ["full", "extra-traits", "visit-mut"] }

[[test]]
name = "pretty"
required-features = ["pretty"]

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
