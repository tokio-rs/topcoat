[package]
name = "topcoat-view"
version = "0.1.0"
edition = "2024"

[features]
axum = ["dep:axum"]
parsing = []
pretty = ["parsing", "dep:topcoat-pretty"]

[dependencies]
topcoat-pretty = { workspace = true, optional = true }

axum = { workspace = true, optional = true }
proc-macro2.workspace = true
quote.workspace = true
syn = { workspace = true, features = ["full", "extra-traits"] }

[dev-dependencies]
topcoat-pretty.workspace = true

[lints]
workspace = true
