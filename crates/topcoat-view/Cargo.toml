[package]
name = "topcoat-view"
version = "0.1.0"
edition = "2024"

[features]
parsing = ["proc-macro2/span-locations", "topcoat-core/parsing", "dep:heck"]
pretty = ["parsing", "dep:topcoat-pretty"]

[dependencies]
topcoat-core.workspace = true
topcoat-pretty = { workspace = true, optional = true }

heck = { workspace = true, optional = true }
proc-macro2.workspace = true
quote.workspace = true
syn = { workspace = true, features = ["full", "extra-traits", "visit-mut"] }

# TODO: Feature flag?
uuid = { workspace = true, features = ["v4", "serde"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["view"] }
topcoat-pretty.workspace = true

[lints]
workspace = true
