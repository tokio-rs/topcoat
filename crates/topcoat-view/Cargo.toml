[package]
name = "topcoat-view"
version = "0.1.0"
edition = "2024"

[features]
parsing = [
	"dep:proc-macro2",
	"dep:quote",
	"dep:syn",
	"dep:heck",
	"proc-macro2/span-locations",
	"topcoat-core/parsing",
]
pretty = [
	"parsing",
	"dep:topcoat-pretty",
]

[dependencies]
topcoat-core.workspace = true
topcoat-pretty = { workspace = true, optional = true }

heck = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, optional = true, features = ["full", "extra-traits", "visit-mut"] }

memchr.workspace = true

# TODO: Feature flag?
uuid = { workspace = true, features = ["v4", "serde"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["view"] }
topcoat-pretty.workspace = true

[[test]]
name = "pretty"
required-features = ["pretty"]

[lints]
workspace = true
