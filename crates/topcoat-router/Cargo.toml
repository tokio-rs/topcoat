[package]
name = "topcoat-router"
version = "0.1.0"
edition = "2024"

[features]
discover = ["dep:inventory"]

[dependencies]
topcoat-asset = { workspace = true, features = ["view"] }
topcoat-core.workspace = true
topcoat-runtime.workspace = true
topcoat-view = { workspace = true, features = ["axum"] }

axum.workspace = true
heck.workspace = true
http.workspace = true
inventory = { workspace = true, optional = true }
ref-cast.workspace = true
serde.workspace = true
serde_urlencoded.workspace = true
thiserror.workspace = true
tokio.workspace = true
tower.workspace = true

[lints]
workspace = true
