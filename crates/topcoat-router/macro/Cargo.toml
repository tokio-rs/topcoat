[package]
name = "topcoat-router-macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[features]
discover = ["topcoat-router/discover"]

[dependencies]
topcoat-router = { workspace = true, features = ["parsing"] }

quote.workspace = true
syn = { workspace = true, features = ["full"] }

[dev-dependencies]
topcoat = { workspace = true, features = ["router"] }
serde = { workspace = true, features = ["derive"] }
uuid = { workspace = true }
http.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[lints]
workspace = true
