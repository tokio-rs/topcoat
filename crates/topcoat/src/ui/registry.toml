# The built-in component registry, shipped by the `topcoat` facade crate.
# Hand-written: each component names its source file; hashes are computed from
# the source at runtime. The registry's identity is its crate name (`topcoat`),
# so the manifest records only the format version, the themes, and the components.

version = 1

[themes.neutral]
source = "themes/neutral.css"

[components.button]
source = "components/button.rs"
